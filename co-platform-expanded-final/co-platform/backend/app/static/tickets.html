<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tickets</title>
  </head>
  <body>
    <h2>Support Tickets</h2>
    <p><a href="/onboarding.html">Onboarding</a> | <a href="/leaves.html">Leaves</a> | <a href="#" id="logout">Logout</a></p>
    <p id="error" style="color: red;"></p>
    <form id="ticketForm">
      <label>
        Title: <input type="text" id="title" required />
      </label>
      <br />
      <label>
        Description: <br />
        <textarea id="description" rows="4" cols="40" required></textarea>
      </label>
      <br />
      <label>
        Severity:
        <select id="severity">
          <option value="low">Low</option>
          <option value="minor">Minor</option>
          <option value="major">Major</option>
          <option value="critical">Critical</option>
        </select>
      </label>
      <br />
      <button type="submit">Submit Ticket</button>
    </form>
    <h3>Your Tickets</h3>
    <table id="ticketTable" border="1" cellpadding="4">
      <thead>
        <tr>
          <th>Title</th>
          <th>Severity</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script>
      function getToken() {
        return localStorage.getItem('token');
      }
      function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
      }
      document.getElementById('logout').addEventListener('click', (e) => {
        e.preventDefault();
        logout();
      });
      async function fetchTickets() {
        const token = getToken();
        if (!token) {
          window.location.href = '/login.html';
          return;
        }
        try {
          const res = await fetch('/tickets/', {
            headers: { Authorization: 'Bearer ' + token },
          });
          if (res.status === 401) {
            logout();
            return;
          }
          const tickets = await res.json();
          const tbody = document.querySelector('#ticketTable tbody');
          tbody.innerHTML = '';
          tickets.forEach((tk) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${tk.title}</td><td>${tk.severity}</td><td>${tk.status}</td>`;
            tbody.appendChild(tr);
          });
        } catch (err) {
          document.getElementById('error').textContent = err.message;
        }
      }
      fetchTickets();
      document.getElementById('ticketForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = getToken();
        if (!token) {
          window.location.href = '/login.html';
          return;
        }
        const payload = {
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          severity: document.getElementById('severity').value,
        };
        try {
          const res = await fetch('/tickets/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + token,
            },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const text = await res.text();
            document.getElementById('error').textContent = text || 'Failed to create ticket';
            return;
          }
          // Clear form and refresh
          document.getElementById('title').value = '';
          document.getElementById('description').value = '';
          document.getElementById('severity').value = 'low';
          document.getElementById('error').textContent = 'Ticket submitted!';
          fetchTickets();
        } catch (err) {
          document.getElementById('error').textContent = err.message;
        }
      });
    </script>
  </body>
</html>
